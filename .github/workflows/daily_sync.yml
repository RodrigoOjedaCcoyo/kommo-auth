name: Daily Kommo to Supabase Sync

on:
  schedule:
    - cron: '0 0 * * *' # Ejecutar todos los días a las 00:00 UTC
  workflow_dispatch: # Permitir ejecución manual

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync pipeline
        env:
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_CLIENT_ID: ${{ secrets.KOMMO_CLIENT_ID }}
          KOMMO_CLIENT_SECRET: ${{ secrets.KOMMO_CLIENT_SECRET }}
          KOMMO_AUTH_CODE: ${{ secrets.KOMMO_AUTH_CODE }}
          REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main_pipeline.py
